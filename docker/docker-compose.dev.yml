# Local development with PostgreSQL
# Usage: docker compose -f docker/docker-compose.dev.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: pgbase-postgres
    environment:
      - POSTGRES_USER=pgbase
      - POSTGRES_PASSWORD=pgbase
      - POSTGRES_MULTIPLE_DATABASES=pbdata,pbaux
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh:ro
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgbase -d pbdata"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgbase:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: pgbase-dev
    ports:
      - 8090:8090
    environment:
      - PB_DATA_URI=postgres://pgbase:pgbase@postgres:5432/pbdata?sslmode=disable&default_query_exec_mode=simple_protocol
      - PB_AUX_URI=postgres://pgbase:pgbase@postgres:5432/pbaux?sslmode=disable&default_query_exec_mode=simple_protocol
      - PB_PUBLIC_DIR=/pb/pb_public
      - PB_HOOKS_DIR=/pb/pb_hooks
      - PB_HOOKS_WATCH=true
      - PB_MIGRATIONS_DIR=/pb/pb_migrations
      - PB_AUTOMIGRATE=true
    volumes:
      - ../examples/base/pb_public:/pb/pb_public
      - ../examples/base/pb_hooks:/pb/pb_hooks
      - ../examples/base/pb_migrations:/pb/pb_migrations
      - pgbase_data:/pb/pb_data
    depends_on:
      postgres:
        condition: service_healthy
    command: ["./pgbase", "serve", "--http=0.0.0.0:8090", "--dev"]

volumes:
  postgres_data:
  pgbase_data:
