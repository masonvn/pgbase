name: CI

on:
  pull_request:
    branches: [main, master. develop]
  push:
    branches: [main, master, develop]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run linter
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --config=golangci.yml

      - name: Run tests
        run: go test ./... -v --cover

      - name: Build
        run: go build ./...
